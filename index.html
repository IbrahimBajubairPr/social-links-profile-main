<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      width: 100vw;
      height:100vh;
      color: #fff;
      background-color:hsl(0, 0%, 8%) ;
      display: grid;
      place-items: center;
       font-family: "Work Sans", sans-serif;
    }
    .container{
      min-width: 350px;
      background-color:hsl(0, 0%, 12%) ;
      border-radius: 10px;
      text-align: center;
      padding: 30px;
      margin: 50px 20px;
    }
    .name {
      font-size: 25px;
      margin-bottom: 10px;
    }
    .container .details p{
      font-size: 14px;
      font-weight: 600;
      color: hsl(75, 94%, 57%);

    }
    
    P{
      color: #ddd;
      font-size: 14px;
    }
    .description{

     margin-bottom: 15px;
     margin-top: 20px;

    }
    img{
      width: 100px;
      border-radius: 100px;
      margin-bottom: 20px;  
    }
    .buttons{
      display: flex;
      flex-direction: column
    }
 .container a{
      text-decoration: none;
      color: #fff;
      font-weight:bold;
      background-color:  hsl(0, 0%, 20%);
      margin:5px 0 ;
      padding: 10px 0;
      border-radius:10px;
      transition: all 0.2s ease-in-out;
    }
 .container  a:hover{
      color: #000;
      background-color:hsl(75, 94%, 57%); ;
    }
footer{
  width: 100%;
  padding: 20px 0;
}
@media (max-width:375px){
  .container{
    width: 300px;
  }
}

  </style>
</head>
<body>

  <div class="container">
    <div class="img-profile">
      <img src="assets/images/1776386219142.png" alt="Profile image">
    </div>
    <div class="details">
      <div  class="name">Ibrahim Ba_jubair</div>
      <p>Hadramout , Repoblic of Yemen </p>
    </div>
     <p class="description">"Front-end developer and <strike>script writer</strike>."</p>
<div class="buttons">
  <a href="#">GitHub</a>
  <a href="#">Frontend Mentor</a>
  <a href="#">LinkedIn</a>
  <a href="#">Twitter</a>
  <a href="#">Instagram</a>
</div>
  </div>

  <!-- Jessica Randall
  London, United Kingdom
  "Front-end developer and avid reader."

  GitHub
  Frontend Mentor
  LinkedIn
  Twitter
  Instagram -->
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://IbrahimBajubairPr.github.io">Ibrahim Zuhair Ba_jubair</a>.
  </footer>
</body>
</html>
